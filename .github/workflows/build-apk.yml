name: Build Android APK Only

on:
  push:
    branches: ['*']
  pull_request:
    branches: ['*']
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Completely isolate mobile build
        run: |
          # Remove root package.json entirely
          rm -f package.json package-lock.json
          # Remove any root node_modules
          rm -rf node_modules
          # Create empty package.json to prevent npm errors
          echo '{}' > package.json

      - name: Install shared package dependencies
        working-directory: packages/shared
        run: npm install

      - name: Install mobile dependencies
        working-directory: apps/mobile
        run: |
          rm -rf node_modules package-lock.json
          npm install

      - name: Setup shared package link
        working-directory: apps/mobile
        run: |
          mkdir -p node_modules/@expiry-alert
          cp -r ../../packages/shared node_modules/@expiry-alert/

      - name: Verify expo-sqlite before build
        working-directory: apps/mobile
        run: |
          echo "=== Mobile node_modules/expo-sqlite ==="
          ls -la node_modules/expo-sqlite/build/ || echo "NOT FOUND IN MOBILE"
          echo ""
          echo "=== Root node_modules check ==="
          ls -la ../../node_modules/expo-sqlite/build/ 2>/dev/null || echo "No root expo-sqlite (GOOD)"

      - name: Final cleanup of root before expo
        run: |
          rm -rf node_modules
          rm -f package.json package-lock.json

      - name: Build Android APK
        working-directory: apps/mobile
        run: |
          # Force Node to only look in local node_modules
          export NODE_PATH="$(pwd)/node_modules"

          npx expo prebuild --platform android --clean
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Upload Android APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: apps/mobile/android/app/build/outputs/apk/release/*.apk
          retention-days: 30
          if-no-files-found: warn
