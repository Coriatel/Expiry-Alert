services:
  expiryalert-api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file:
      - ./apps/api/.env
    ports:
      - "3011:3001"
    restart: unless-stopped
    depends_on:
      directus:
        condition: service_healthy
    networks:
      - app_default
      - default
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/api/health').then(r=>{if(!r.ok)throw 1})"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  directus:
    image: directus/directus:11.14.1
    ports:
      - "8055:8055"
    volumes:
      - ./directus/uploads:/directus/uploads
      - ./directus/extensions:/directus/extensions
    environment:
      KEY: "${DIRECTUS_KEY}"
      SECRET: "${DIRECTUS_SECRET}"
      ADMIN_EMAIL: "${DIRECTUS_ADMIN_EMAIL}"
      ADMIN_PASSWORD: "${DIRECTUS_ADMIN_PASSWORD}"
      DB_CLIENT: 'pg'
      DB_HOST: 'flow-control-db'
      DB_PORT: '5432'
      DB_DATABASE: 'flow_control'
      DB_USER: 'directus'
      DB_PASSWORD: 'directus_password'
      DB_SEARCH_PATH: 'public,inventory,crm'
      WEBSOCKETS_ENABLED: 'true'
      PUBLIC_URL: 'https://cms.expiryalert.coriathost.cloud'
    restart: unless-stopped
    networks:
      - app_default
      - default
    deploy:
      resources:
        limits:
          memory: 2G
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8055/server/health').then(r=>{if(!r.ok)throw 1})"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  directus-data:

networks:
  app_default:
    external: true
