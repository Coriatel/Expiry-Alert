version: '3.9'

services:
  expiryalert-api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file:
      - ./apps/api/.env
    ports:
      - "3011:3001"
    restart: unless-stopped
    depends_on:
      - directus
    networks:
      - app_default
      - default

  directus:
    image: directus/directus:latest
    ports:
      - "8055:8055"
    volumes:
      - ./directus/uploads:/directus/uploads
      - ./directus/extensions:/directus/extensions
    environment:
      KEY: "${DIRECTUS_KEY}"
      SECRET: "${DIRECTUS_SECRET}"
      ADMIN_EMAIL: "${DIRECTUS_ADMIN_EMAIL}"
      ADMIN_PASSWORD: "${DIRECTUS_ADMIN_PASSWORD}"
      DB_CLIENT: 'pg'
      DB_HOST: 'flow-control-db'
      DB_PORT: '5432'
      DB_DATABASE: 'flow_control'
      DB_USER: 'directus'
      DB_PASSWORD: 'directus_password'
      DB_SEARCH_PATH: 'public,inventory,crm'
      WEBSOCKETS_ENABLED: 'true'
      PUBLIC_URL: 'https://cms.expiryalert.coriathost.cloud'
    restart: unless-stopped
    networks:
      - app_default
      - default

volumes:
  directus-data:

networks:
  app_default:
    external: true