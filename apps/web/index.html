<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#1B5E7B" />
    <meta name="description" content="Track reagent expiration dates and receive alerts" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Expiry Alert" />

    <!-- Icons -->
    <link rel="icon" href="/favicon-v2.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32-v2.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16-v2.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon-v2.png" />
    <link rel="mask-icon" href="/mask-icon-v2.svg" color="#1B5E7B" />

    <title>Reagent Expiry Tracker</title>
  </head>
  <body>
    <div id="root">
      <!-- Pre-React splash (removed once React mounts) -->
      <div id="splash" style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#fff;gap:16px">
        <img src="/logo-icon-v2.png" alt="" width="80" height="80" style="animation:splashPulse 1.2s ease-in-out infinite" />
        <style>@keyframes splashPulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.06);opacity:.85}}</style>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
