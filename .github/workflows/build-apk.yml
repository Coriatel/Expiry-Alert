name: Build Android APK Only

on:
  push:
    branches: ['*']
  pull_request:
    branches: ['*']
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Temporarily remove workspace config
        run: |
          # Backup root package.json and remove workspace config
          cp package.json package.json.backup
          echo '{"name":"temp","private":true}' > package.json

      - name: Install dependencies in mobile app
        working-directory: apps/mobile
        run: |
          # Clean install without workspace
          rm -rf node_modules package-lock.json
          npm install --legacy-peer-deps

      - name: Verify expo-sqlite
        working-directory: apps/mobile
        run: |
          ls -la node_modules/expo-sqlite/build/ | head -20

      - name: Build Android APK
        working-directory: apps/mobile
        run: |
          npx expo prebuild --platform android --clean
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon --stacktrace
        env:
          EXPO_NO_DOTENV: '1'
          NODE_ENV: 'production'

      - name: List build outputs
        if: always()
        working-directory: apps/mobile
        run: |
          echo "Checking for APK files..."
          find android -name "*.apk" -type f || echo "No APK files found"

      - name: Upload Android APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: apps/mobile/android/app/build/outputs/apk/release/*.apk
          retention-days: 30
          if-no-files-found: warn
