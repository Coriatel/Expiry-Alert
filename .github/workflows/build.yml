name: Build Desktop and Mobile Apps

on:
  push:
    branches: ['*']
  pull_request:
    branches: ['*']
  workflow_dispatch: # Allows manual trigger

jobs:
  build-desktop:
    name: Build Desktop App (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm install

      - name: Build Desktop App
        run: npm run tauri:build
        working-directory: apps/desktop

      - name: Upload Windows Installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            apps/desktop/src-tauri/target/release/bundle/msi/*.msi
            apps/desktop/src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 30
          if-no-files-found: warn

  build-mobile-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Prepare isolated mobile build
        run: |
          # Remove root package.json workspaces to prevent hoisting
          echo '{"name": "root", "private": true}' > package.json
          # Ensure no root node_modules exists
          rm -rf node_modules

      - name: Install shared package
        working-directory: packages/shared
        run: npm install

      - name: Install mobile dependencies
        working-directory: apps/mobile
        run: npm install

      - name: Link shared package to mobile
        working-directory: apps/mobile
        run: |
          mkdir -p node_modules/@expiry-alert
          ln -sf ../../../packages/shared node_modules/@expiry-alert/shared

      - name: Clean root node_modules before build
        run: |
          # CRITICAL: Remove any expo-sqlite from root to force local resolution
          rm -rf node_modules
          echo "Root node_modules removed"
          ls -la node_modules 2>/dev/null || echo "Confirmed: no root node_modules"

      - name: Build Android APK
        working-directory: apps/mobile
        run: |
          # Verify expo-sqlite exists in mobile
          echo "=== Checking expo-sqlite in mobile ==="
          ls -la node_modules/expo-sqlite/build/

          # Run expo prebuild
          npx expo prebuild --platform android --clean

          # Build APK
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: apps/mobile/android/app/build/outputs/apk/release/*.apk
          retention-days: 30
          if-no-files-found: error
